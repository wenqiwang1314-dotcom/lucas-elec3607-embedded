<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: bold 36px Arial, sans-serif; fill:#111827; }
      .subtitle { font: 21px Arial, sans-serif; fill:#374151; }
      .label { font: bold 19px Arial, sans-serif; fill:#111827; }
      .small { font: 16px Arial, sans-serif; fill:#374151; }
      .tiny { font: 13px Arial, sans-serif; fill:#4b5563; }
      .board { fill:#d1fae5; stroke:#065f46; stroke-width:5; }
      .zone { fill:#ffffff; stroke:#6b7280; stroke-width:2; rx:10; }
      .pad { fill:#f9fafb; stroke:#111827; stroke-width:2; }
      .pin17 { fill:#fee2e2; stroke:#dc2626; stroke-width:4; }
      .gndpin { fill:#e0f2fe; stroke:#0284c7; stroke-width:4; }
      .rfin { fill:#fef3c7; stroke:#d97706; stroke-width:4; }
      .wire { stroke:#dc2626; stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrow-red); }
      .gndwire { stroke:#0284c7; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke:#111827; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .callout { fill:#fff7ed; stroke:#ea580c; stroke-width:2; rx:12; }
      .note { fill:#eff6ff; stroke:#2563eb; stroke-width:2; rx:12; }
      .danger { fill:#fef2f2; stroke:#dc2626; stroke-width:2; rx:12; }
      .component { fill:#fff; stroke:#111827; stroke-width:3; rx:4; }
      .dot { fill:#111827; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#ffffff"/>

  <text x="60" y="62" class="title">Part A Hardware Modification: RF Loopback from CLK2 to Receiver Input</text>
  <text x="60" y="96" class="subtitle">Purpose: test the WSPR transmitter with a hardwired RF path, not over-the-air, and protect the sensitive receiver input.</text>

  <!-- Board top view -->
  <rect x="90" y="150" width="780" height="820" rx="50" class="board"/>
  <text x="120" y="190" class="label">WSPR-SDR PCB, top view, simplified</text>
  <text x="120" y="218" class="small">Only the pads needed for the Part A modification are drawn.</text>

  <!-- J1 header zone -->
  <rect x="555" y="300" width="170" height="455" class="zone"/>
  <text x="590" y="330" class="label">J1 2x14</text>
  <text x="572" y="353" class="tiny">main lab header</text>

  <!-- J1 pads: left odd, right even. Pin 1 at top, then down. -->
  <!-- coordinate generation by hand, y step 28 -->
  <g>
    <circle cx="610" cy="385" r="10" class="pad"/><text x="585" y="390" class="tiny">1</text>
    <circle cx="670" cy="385" r="10" class="pad"/><text x="682" y="390" class="tiny">2</text>
    <circle cx="610" cy="413" r="10" class="pad"/><text x="585" y="418" class="tiny">3</text>
    <circle cx="670" cy="413" r="10" class="pad"/><text x="682" y="418" class="tiny">4</text>
    <circle cx="610" cy="441" r="10" class="pad"/><text x="585" y="446" class="tiny">5</text>
    <circle cx="670" cy="441" r="10" class="rfin"/><text x="682" y="446" class="tiny">6 RFIN</text>
    <circle cx="610" cy="469" r="10" class="pad"/><text x="585" y="474" class="tiny">7</text>
    <circle cx="670" cy="469" r="10" class="pad"/><text x="682" y="474" class="tiny">8</text>
    <circle cx="610" cy="497" r="10" class="pad"/><text x="585" y="502" class="tiny">9</text>
    <circle cx="670" cy="497" r="10" class="pad"/><text x="682" y="502" class="tiny">10</text>
    <circle cx="610" cy="525" r="10" class="pad"/><text x="580" y="530" class="tiny">11</text>
    <circle cx="670" cy="525" r="10" class="pad"/><text x="682" y="530" class="tiny">12</text>
    <circle cx="610" cy="553" r="10" class="pad"/><text x="580" y="558" class="tiny">13</text>
    <circle cx="670" cy="553" r="10" class="pad"/><text x="682" y="558" class="tiny">14</text>
    <circle cx="610" cy="581" r="10" class="pad"/><text x="580" y="586" class="tiny">15</text>
    <circle cx="670" cy="581" r="10" class="pad"/><text x="682" y="586" class="tiny">16</text>
    <circle cx="610" cy="609" r="12" class="pin17"/><text x="574" y="614" class="tiny">17 CLK2</text>
    <circle cx="670" cy="609" r="12" class="gndpin"/><text x="682" y="614" class="tiny">18 GND</text>
    <circle cx="610" cy="637" r="10" class="pad"/><text x="580" y="642" class="tiny">19</text>
    <circle cx="670" cy="637" r="10" class="pad"/><text x="682" y="642" class="tiny">20</text>
    <circle cx="610" cy="665" r="10" class="pad"/><text x="580" y="670" class="tiny">21</text>
    <circle cx="670" cy="665" r="10" class="pad"/><text x="682" y="670" class="tiny">22</text>
    <circle cx="610" cy="693" r="10" class="pad"/><text x="580" y="698" class="tiny">23</text>
    <circle cx="670" cy="693" r="10" class="pad"/><text x="682" y="698" class="tiny">24</text>
    <circle cx="610" cy="721" r="10" class="pad"/><text x="580" y="726" class="tiny">25</text>
    <circle cx="670" cy="721" r="10" class="pad"/><text x="682" y="726" class="tiny">26</text>
  </g>

  <!-- U2 and receiver zone -->
  <rect x="475" y="180" width="170" height="72" class="zone"/>
  <text x="505" y="210" class="label">U2 Si5351</text>
  <text x="500" y="235" class="tiny">CLK2 also appears at J1 pin 17</text>

  <rect x="150" y="530" width="270" height="205" class="zone"/>
  <text x="175" y="565" class="label">Receiver RF input area</text>
  <text x="175" y="593" class="small">Use RFIN_TP7 if fitted.</text>
  <circle cx="285" cy="650" r="26" class="rfin"/>
  <text x="245" y="706" class="label">RFIN_TP7</text>
  <text x="175" y="732" class="tiny">Alternative: J1 pin 6, same RFIN net.</text>

  <rect x="150" y="250" width="270" height="150" class="zone"/>
  <text x="175" y="285" class="label">Ground point</text>
  <text x="175" y="313" class="small">Use J1 pin 18 or GND_TP0.</text>
  <circle cx="285" cy="355" r="24" class="gndpin"/>
  <text x="250" y="395" class="label">GND_TP0</text>

  <!-- Physical attenuator dead bug -->
  <rect x="905" y="170" width="620" height="400" class="callout"/>
  <text x="935" y="210" class="label">Actual soldered loopback network</text>
  <text x="935" y="238" class="small">Build this as short flying leads, or on a tiny scrap of perfboard.</text>

  <text x="940" y="292" class="label">CLK2</text>
  <line x1="1005" y1="286" x2="1085" y2="286" class="thin"/>
  <rect x="1085" y="267" width="86" height="38" class="component"/>
  <text x="1102" y="292" class="small">10 nF</text>
  <line x1="1171" y1="286" x2="1240" y2="286" class="thin"/>
  <rect x="1240" y="267" width="92" height="38" class="component"/>
  <text x="1256" y="292" class="small">100 k</text>
  <line x1="1332" y1="286" x2="1425" y2="286" class="thin"/>
  <text x="1438" y="292" class="label">RFIN</text>

  <circle cx="1425" cy="286" r="6" class="dot"/>
  <line x1="1425" y1="286" x2="1425" y2="365" class="thin"/>
  <rect x="1380" y="365" width="90" height="38" class="component"/>
  <text x="1399" y="390" class="small">51 ohm</text>
  <line x1="1425" y1="403" x2="1425" y2="455" class="thin"/>
  <path d="M1402 455 L1448 455 M1410 470 L1440 470 M1418 485 L1432 485" class="thin"/>
  <text x="1454" y="465" class="label">GND</text>

  <text x="935" y="520" class="small">Recommended parts: C = 10 nF ceramic; Rseries = 100 k; Rshunt = 51 ohm.</text>
  <text x="935" y="548" class="small">If the receiver audio clips, increase Rseries to 220 k.</text>

  <!-- Wires from board to components -->
  <path d="M610 609 C760 620 825 350 1005 286" class="wire"/>
  <text x="725" y="610" class="label">short insulated wire</text>
  <path d="M1425 286 C1100 430 760 650 285 650" class="wire"/>
  <text x="800" y="505" class="label">attenuated RF to receiver input</text>
  <path d="M1425 455 C1110 800 670 835 285 355" class="gndwire"/>
  <text x="830" y="805" class="label" fill="#0284c7">ground return</text>

  <!-- Warnings and calculations -->
  <rect x="905" y="610" width="620" height="150" class="danger"/>
  <text x="935" y="650" class="label">Do not connect CLK2 directly to RFIN</text>
  <text x="935" y="682" class="small">Si5351 CLK2 is a 0-3.3 V CMOS square wave. Its 7 MHz fundamental is about</text>
  <text x="935" y="710" class="small">1.49 Vrms, or +16.5 dBm into 50 ohm. The receiver input is much more sensitive.</text>
  <text x="935" y="738" class="small">The 100 k / 51 ohm divider gives about -65.9 dB attenuation.</text>

  <rect x="905" y="795" width="620" height="175" class="note"/>
  <text x="935" y="835" class="label">Step-by-step physical modification</text>
  <text x="935" y="867" class="small">1. Power off the board. Confirm J1 pin 17 and RFIN_TP7 with continuity/probe.</text>
  <text x="935" y="895" class="small">2. Solder 10 nF in series with a 100 k resistor from J1 pin 17.</text>
  <text x="935" y="923" class="small">3. Solder the far end of the 100 k resistor to RFIN_TP7.</text>
  <text x="935" y="951" class="small">4. Solder 51 ohm from RFIN_TP7 to J1 pin 18 or GND_TP0.</text>

  <!-- Summary path -->
  <rect x="120" y="810" width="700" height="115" class="note"/>
  <text x="150" y="850" class="label">Final Part A RF path</text>
  <text x="150" y="882" class="small">Si5351 CLK2 -> DC block -> large attenuation -> RFIN -> existing receiver/decoder</text>
  <text x="150" y="910" class="small">This is hardwired RF loopback. Nothing should be radiated from an antenna.</text>
</svg>
